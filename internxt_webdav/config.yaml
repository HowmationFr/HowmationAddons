name: Internxt WebDAV
version: "0.1.0"
slug: internxt_webdav
description: Lance Internxt CLI en mode WebDAV pour exposer le stockage Internxt à l'intégration WebDAV de Home Assistant (sauvegardes).
url: https://github.com/HowmationFr/HowmationAddons/tree/main/internxt_webdav
stage: experimental
arch:
  - amd64
  - aarch64
init: false
boot: auto
startup: services
host_network: false
ports:
  "3005/tcp": 3005
ports_description:
  "3005/tcp": Endpoint WebDAV (HTTP, à cibler depuis l'intégration WebDAV de HA)
homeassistant_api: false
hassio_api: false
auth_api: false
ingress: false
panel_icon: mdi:cloud-upload-outline
options:
  internxt_email: ""
  internxt_password: ""
  internxt_otp_secret: ""
  internxt_workspace_id: ""
  webdav_username: "homeassistant"
  webdav_password: ""
  delete_files_permanently: false
schema:
  internxt_email: email
  internxt_password: password
  internxt_otp_secret: "str?"
  internxt_workspace_id: "str?"
  webdav_username: str
  webdav_password: password
  delete_files_permanently: bool
