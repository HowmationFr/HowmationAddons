name: Internxt WebDAV
version: "0.1.1"
slug: internxt_webdav
description: Runs Internxt CLI in WebDAV mode so Internxt Drive can be used as a backup destination by the Home Assistant core WebDAV integration.
url: https://github.com/HowmationFr/HowmationAddons/tree/main/internxt_webdav
stage: stable
arch:
  - amd64
  - aarch64
init: false
boot: auto
startup: services
host_network: false
ports:
  "3005/tcp": 3005
ports_description:
  "3005/tcp": WebDAV endpoint (HTTP, target this from HA's WebDAV integration)
homeassistant_api: false
hassio_api: false
auth_api: false
ingress: false
panel_icon: mdi:cloud-upload-outline
options:
  internxt_email: ""
  internxt_password: ""
  internxt_otp_secret: ""
  internxt_workspace_id: ""
  webdav_username: "homeassistant"
  webdav_password: ""
  delete_files_permanently: false
schema:
  internxt_email: email
  internxt_password: password
  internxt_otp_secret: "str?"
  internxt_workspace_id: "str?"
  webdav_username: str
  webdav_password: password
  delete_files_permanently: bool
